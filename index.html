<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmalGus | Smart Product Discovery</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0D9488', 'primary-dark': '#0f766e' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        // In a real Vite app, these would be imports. 
        // For this single-file working demo, we keep them accessible.
        
        const PRODUCTS = [
            { id: 1, name: "6mm Clear Tempered Glass", category: "Tempered Glass", thickness: 6, color: "Clear", coating: "None", edgeFinish: "Polished", pricePerSqm: 950, supplier: "Asahi India Glass (AIS)", description: "Safety glass for partitions." },
            { id: 2, name: "12mm Extra Clear Toughened Glass", category: "Tempered Glass", thickness: 12, color: "Clear", coating: "None", edgeFinish: "Polished", pricePerSqm: 2100, supplier: "Saint-Gobain India", description: "Heavy-duty storefronts." },
            { id: 3, name: "10.76mm Laminated Safety Glass", category: "Laminated Glass", thickness: 10.76, color: "Clear", coating: "UV Protection", edgeFinish: "Seamed", pricePerSqm: 1850, supplier: "Gold Plus Glass", description: "Security and railings." },
            { id: 4, name: "24mm Double Glazed Unit", category: "Insulated Glass Unit", thickness: 24, color: "Clear", coating: "Low-E", edgeFinish: "Seamed", pricePerSqm: 3200, supplier: "Sisecam Flat Glass", description: "Energy efficiency." },
            { id: 5, name: "5mm Silver Mirror", category: "Mirror", thickness: 5, color: "Clear", coating: "None", edgeFinish: "Bevelled", pricePerSqm: 750, supplier: "ModiGuard Glass", description: "Interior decor." },
            { id: 6, name: "8mm Bronze Tinted Glass", category: "Float Glass", thickness: 8, color: "Bronze", coating: "None", edgeFinish: "Seamed", pricePerSqm: 1150, supplier: "Hindusthan National Glass", description: "Glare reduction." },
            { id: 7, name: "Heavy Duty Floor Spring", category: "Aluminium Hardware", thickness: 0, color: "Satin", coating: "Anti-Rust", edgeFinish: "Polished", pricePerSqm: 4500, supplier: "Dorma India", description: "Door pivots." },
            { id: 8, name: "Four-Way Spider Fitting", category: "Spider Fittings", thickness: 0, color: "Steel", coating: "None", edgeFinish: "Mirror", pricePerSqm: 1200, supplier: "Ozone Overseas", description: "Structural glazing." },
            { id: 9, name: "6mm Frosted Tempered Glass", category: "Tempered Glass", thickness: 6, color: "Frosted", coating: "None", edgeFinish: "Polished", pricePerSqm: 1400, supplier: "Saint-Gobain India", description: "Privacy partitions." },
            { id: 10, name: "19.52mm SGP Laminated Glass", category: "Laminated Glass", thickness: 19.52, color: "Clear", coating: "None", edgeFinish: "Polished", pricePerSqm: 8500, supplier: "Asahi India Glass (AIS)", description: "Glass floors." },
            { id: 11, name: "Patch Fitting Set", category: "Aluminium Hardware", thickness: 0, color: "Silver", coating: "None", edgeFinish: "Brushed", pricePerSqm: 2800, supplier: "Hardwyn India", description: "Door fittings." },
            { id: 12, name: "6mm Blue Solar Glass", category: "Float Glass", thickness: 6, color: "Blue", coating: "Sun Control", edgeFinish: "Seamed", pricePerSqm: 1350, supplier: "Gold Plus Glass", description: "Facade cooling." }
        ];

        async function findBestMatches(userQuery, products) {
            const API_URL = "https://api.groq.com/openai/v1/chat/completions";
            const API_KEY = window.VITE_GROQ_API_KEY || ""; 

            if (!API_KEY) {
                console.warn("Groq API Key missing. Returning mock data.");
                return products.slice(0, 3).map(p => ({ id: p.id, matchScore: 95, matchReason: "High relevance to your structural safety needs." }));
            }

            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "llama3-70b-8192",
                    messages: [
                        { role: "system", content: `You are an AmalGus consultant. Score these products 0-100 based on the query. Return ONLY a JSON array: [{id, matchScore, matchReason}]. Catalog: ${JSON.stringify(products)}` },
                        { role: "user", content: userQuery }
                    ],
                    temperature: 0,
                    response_format: { type: "json_object" }
                })
            });
            const data = await response.json();
            const result = JSON.parse(data.choices[0].message.content);
            return Array.isArray(result) ? result : (result.matches || Object.values(result)[0]);
        }

        const App = () => {
            const [query, setQuery] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const [results, setResults] = React.useState([]);
            const [filters, setFilters] = React.useState({ category: 'All', maxPrice: '', thickness: 'Any' });

            const suggestions = [
                "6mm tempered glass for office cabin partition, clear, polished edges",
                "Laminated safety glass for balcony railing, UV protected, 8-10mm",
                "Energy efficient insulated glass unit, 5+12+5, 2 meter height"
            ];

            const executeSearch = async () => {
                if (!query.trim()) return;
                setLoading(true);

                try {
                    // 1. Filter local products first
                    const filtered = PRODUCTS.filter(p => {
                        const catMatch = filters.category === 'All' || p.category === filters.category;
                        const priceMatch = !filters.maxPrice || p.pricePerSqm <= parseInt(filters.maxPrice);
                        let thickMatch = true;
                        if (filters.thickness !== 'Any') {
                            const val = parseInt(filters.thickness);
                            if (filters.thickness === '12mm+') thickMatch = p.thickness >= 12;
                            else thickMatch = Math.floor(p.thickness) === val;
                        }
                        return catMatch && priceMatch && thickMatch;
                    });

                    // 2. Call AI with filtered subset
                    const matches = await findBestMatches(query, filtered);

                    // 3. Join with full product data
                    const joined = matches.map(m => ({
                        ...m,
                        product: PRODUCTS.find(p => p.id === m.id)
                    })).filter(j => j.product);

                    setResults(joined);
                } catch (e) {
                    console.error("Search failed", e);
                } finally {
                    setLoading(false);
                    setTimeout(() => lucide.createIcons(), 100);
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-white border-b border-slate-200 py-6 px-4 mb-8 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex flex-col">
                                <h1 className="text-2xl font-bold text-primary flex items-center gap-2">
                                    <i data-lucide="layers" className="w-6 h-6"></i> AmalGus
                                </h1>
                                <p className="text-xs text-slate-400 font-medium">Find the Right Glass, Instantly</p>
                            </div>
                            <div className="flex items-center gap-4">
                                {!window.VITE_GROQ_API_KEY && (
                                    <div className="flex items-center bg-slate-100 rounded-full px-3 py-1.5 border border-slate-200 gap-2">
                                        <i data-lucide="key" className="w-3 h-3 text-slate-400"></i>
                                        <input 
                                            type="password" 
                                            placeholder="Enter Groq Key" 
                                            className="bg-transparent text-[10px] outline-none w-24"
                                            onChange={(e) => window.VITE_GROQ_API_KEY = e.target.value}
                                        />
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4">
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 mb-12">
                            <div className="mb-4">
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Describe what you need...</label>
                                <textarea 
                                    className="w-full h-32 p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all placeholder:text-slate-300"
                                    placeholder="Requirement description..."
                                    value={query}
                                    onChange={(e) => setQuery(e.target.value)}
                                />
                                <div className="mt-3 flex flex-wrap gap-2">
                                    {suggestions.map((s, i) => (
                                        <button 
                                            key={i} 
                                            onClick={() => setQuery(s)}
                                            className="text-xs bg-slate-50 border border-slate-200 text-slate-500 px-3 py-1.5 rounded-full hover:border-primary hover:text-primary transition-all"
                                        >
                                            + {s.substring(0, 40)}...
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 mt-8">
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-2">Category</label>
                                    <select className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg" value={filters.category} onChange={e => setFilters({...filters, category: e.target.value})}>
                                        <option>All</option>
                                        <option>Tempered Glass</option><option>Laminated Glass</option><option>Float Glass</option>
                                        <option>Insulated Glass Unit</option><option>Mirror</option><option>Aluminium Hardware</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-2">Max Price (INR/sqm)</label>
                                    <input type="number" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg" placeholder="Price" value={filters.maxPrice} onChange={e => setFilters({...filters, maxPrice: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-2">Thickness</label>
                                    <select className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg" value={filters.thickness} onChange={e => setFilters({...filters, thickness: e.target.value})}>
                                        <option>Any</option><option>4mm</option><option>6mm</option><option>8mm</option><option>10mm</option><option>12mm+</option>
                                    </select>
                                </div>
                            </div>

                            <button onClick={executeSearch} disabled={loading} className="w-full py-4 bg-primary hover:bg-primary-dark text-white font-bold rounded-xl transition-all shadow-lg flex items-center justify-center gap-2">
                                {loading ? "Finding Best Matches..." : <><i data-lucide="sparkles"></i> Find Best Matches</>}
                            </button>
                        </div>

                        {loading ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-pulse">
                                {[1,2,3,4].map(i => <div key={i} className="bg-white h-64 rounded-2xl border border-slate-100"></div>)}
                            </div>
                        ) : results.length > 0 && (
                            <div>
                                <h2 className="text-2xl font-bold text-slate-800 mb-8">Top Matches for your requirement</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {results.map(res => (
                                        <div key={res.id} className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm flex flex-col">
                                            <div className="p-6 flex-1">
                                                <div className="flex justify-between items-start mb-4">
                                                    <span className="text-[10px] font-bold uppercase tracking-widest text-primary bg-teal-50 px-2 py-1 rounded">{res.product.category}</span>
                                                    <span className="text-lg font-bold">₹{res.product.pricePerSqm}</span>
                                                </div>
                                                <h3 className="font-bold text-slate-900 mb-4">{res.product.name}</h3>
                                                
                                                <div className="mb-6">
                                                    <div className="flex justify-between text-xs font-bold mb-1">
                                                        <span className="text-slate-500">Match Accuracy</span>
                                                        <span className={res.matchScore >= 80 ? "text-emerald-600" : "text-amber-600"}>{res.matchScore}%</span>
                                                    </div>
                                                    <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                                                        <div className={`h-full ${res.matchScore >= 80 ? 'bg-emerald-500' : 'bg-amber-500'}`} style={{width: `${res.matchScore}%`}}></div>
                                                    </div>
                                                </div>

                                                <div className="flex flex-wrap gap-1.5 mb-6">
                                                    {[res.product.thickness + 'mm', res.product.color, res.product.coating, res.product.edgeFinish].map(t => (
                                                        <span key={t} className="text-[10px] bg-slate-50 border border-slate-100 text-slate-500 px-2 py-1 rounded font-medium">{t}</span>
                                                    ))}
                                                </div>

                                                <div className="bg-slate-50 p-4 rounded-xl text-sm border border-slate-100 text-slate-600 italic mb-4 font-normal leading-relaxed">
                                                    "{res.matchReason}"
                                                </div>
                                            </div>
                                            <div className="p-6 pt-0 mt-auto">
                                                <div className="text-xs text-slate-400 mb-4 flex items-center gap-1"><i data-lucide="factory" className="w-3"></i> {res.product.supplier}</div>
                                                <button className="w-full py-3 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 font-bold rounded-xl transition-all">Request Quote</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
